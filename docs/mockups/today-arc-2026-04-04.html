<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseline — Today Arc (focused)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0B0E;
    --card: #17171B;
    --card-elevated: #1F1F24;
    --text-primary: #F2F3F5;
    --text-secondary: #797B83;
    --text-tertiary: #494B52;
    --divider: #2A2A30;
    --accent: #6B7B94;
    --negative: #A8624E;
    --positive: #5C8A6A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Exo 2", -apple-system, sans-serif;
    background: #E8E8EA;
    padding: 40px;
    display: flex;
    gap: 40px;
    align-items: flex-start;
  }

  .panel { display: flex; flex-direction: column; gap: 12px; }
  .panel-label {
    font-family: -apple-system, sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #1A1A1C;
  }
  .panel-sub {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: #6B6B72;
    line-height: 1.5;
    max-width: 420px;
  }

  .phone {
    width: 440px;
    aspect-ratio: 393 / 852;
    background: var(--bg);
    border-radius: 56px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    font-family: "Exo 2", sans-serif;
  }

  /* Status bar */
  .status-bar {
    padding: 20px 34px 0;
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
  }

  /* Toolbar */
  .toolbar {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 56px;
  }
  .icon-btn { width: 30px; height: 30px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }
  .icon-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* Content */
  .content { flex: 1; display: flex; flex-direction: column; padding: 0 24px; }

  .range-header {
    text-align: center;
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    margin-top: 8px;
  }

  /* Arc block - flex-grow to fill */
  .arc-block {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 380px;
  }
  .arc-svg {
    width: 100%;
    max-width: 380px;
    height: auto;
    display: block;
  }
  .arc-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .weight-num {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--text-primary);
  }
  .weight-num .unit {
    font-size: 28px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-left: 5px;
    letter-spacing: 0;
  }
  .today-label {
    font-family: -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: 12px;
  }

  /* Range toggle */
  .range-toggle {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }
  .range-toggle-inner {
    display: inline-flex;
    background: var(--card);
    border-radius: 11px;
    padding: 4px;
  }
  .range-toggle .opt {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    padding: 9px 22px;
    border-radius: 8px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .range-toggle .opt.active {
    background: var(--card-elevated);
    color: var(--text-primary);
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--divider);
    border-radius: 18px;
    overflow: hidden;
    margin-top: 24px;
  }
  .stat { background: var(--card); padding: 20px 8px; text-align: center; }
  .stat .label {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .stat .value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
  .stat .value .unit { font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-left: 2px; }

  /* Bottom chrome */
  .bottom-chrome { flex-shrink: 0; padding: 0 24px 0; }
  .weigh-btn {
    width: 100%;
    background: var(--accent);
    color: #FFFFFF;
    border-radius: 18px;
    padding: 22px 0;
    font-family: "Exo 2", sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: none;
    margin-top: 28px;
  }
  .tab-bar {
    height: 88px;
    background: rgba(11, 11, 14, 0.9);
    backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--divider);
    display: flex;
    padding: 12px 0 28px;
    margin: 20px -24px 0;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    color: var(--text-tertiary);
  }
  .tab.active { color: var(--accent); }
  .tab .icon { width: 28px; height: 28px; }
  .tab .icon svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .tab.active .icon svg { stroke-width: 2.4; }
  .tab .label {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .tab.active .label { font-weight: 700; }
</style>
</head>
<body>

  <div class="panel">
    <div class="panel-label">Today · Relative Arc</div>
    <div class="panel-sub">Arc shows where today's weight sits in the 30-day range. Number is the hero, centered in a 270° arc.</div>
    <div class="phone">
      <div class="status-bar"><span>9:41</span><span>⚡ 100%</span></div>
      <div class="toolbar">
        <div class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
        <div class="icon-btn"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></div>
      </div>

      <div class="content">
        <div class="range-header">Last 30 Days</div>

        <div class="arc-block">
          <!--
            Arc: 270° opening at bottom
            Circle center (170, 170), radius 130
            Start at 225° (bottom-left): (78.1, 261.9)
            End at 135° (bottom-right): (261.9, 261.9)
            Progress at 55%: end angle = 225° + 148.5° = 373.5° = 13.5°
            Progress end point: x = 170 + 130*sin(13.5°) = 200.3
                               y = 170 - 130*cos(13.5°) = 43.6
          -->
          <svg class="arc-svg" viewBox="0 0 340 290" preserveAspectRatio="xMidYMid meet">
            <!-- Background arc (270°) -->
            <path d="M 78.1 261.9 A 130 130 0 1 1 261.9 261.9"
                  stroke="#2A2A30" stroke-width="8" fill="none" stroke-linecap="round" />
            <!-- Progress arc (55%) -->
            <path d="M 78.1 261.9 A 130 130 0 0 1 200.3 43.6"
                  stroke="#6B7B94" stroke-width="8" fill="none" stroke-linecap="round" />
            <!-- Position marker dot -->
            <circle cx="200.3" cy="43.6" r="10" fill="#6B7B94" />
            <circle cx="200.3" cy="43.6" r="4" fill="#F2F3F5" />
            <!-- Range endpoint labels -->
            <text x="56" y="287" font-family="-apple-system" font-size="11" fill="#494B52" font-weight="600" text-anchor="middle">195.8</text>
            <text x="284" y="287" font-family="-apple-system" font-size="11" fill="#494B52" font-weight="600" text-anchor="middle">198.7</text>
          </svg>
          <div class="arc-center">
            <div class="weight-num">197.4<span class="unit">lb</span></div>
            <div class="today-label">Today</div>
          </div>
        </div>

        <div class="range-toggle">
          <div class="range-toggle-inner">
            <div class="opt">7D</div>
            <div class="opt active">30D</div>
            <div class="opt">90D</div>
          </div>
        </div>

        <div class="stats">
          <div class="stat"><div class="label">Lowest</div><div class="value">195.8<span class="unit">lb</span></div></div>
          <div class="stat"><div class="label">Average</div><div class="value">197.2<span class="unit">lb</span></div></div>
          <div class="stat"><div class="label">Highest</div><div class="value">198.7<span class="unit">lb</span></div></div>
        </div>

        <div class="bottom-chrome">
          <button class="weigh-btn">Weigh In</button>
          <div class="tab-bar">
            <div class="tab"><div class="icon"><svg viewBox="0 0 24 24"><polyline points="3,17 9,11 13,15 21,7"/><polyline points="15,7 21,7 21,13"/></svg></div><div class="label">Trends</div></div>
            <div class="tab active"><div class="icon"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M12 8 L14.5 12.5 L9.5 12.5 Z" fill="currentColor" stroke="none"/></svg></div><div class="label">Now</div></div>
            <div class="tab"><div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.5"/><line x1="12" y1="7.5" x2="12" y2="14"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="12" y1="14" x2="9" y2="20"/><line x1="12" y1="14" x2="15" y2="20"/></svg></div><div class="label">Body</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
